<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Candidate Review</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 20px; } label { display:block; margin:12px 0 4px; font-weight:600; }
    textarea { width:100%; min-height:120px; padding:8px; font:inherit; }
    .opt { font-weight:400; margin:4px 0; } button { margin-top:16px; padding:10px 18px; font-size:15px; cursor:pointer; }
    .msg { margin-top:16px; padding:10px; border-radius:6px; } .ok{background:#e7f6ec;} .err{background:#fdeaea;}
    .hide { display:none; }
  </style>
</head>
<body>
  <h1>Candidate review</h1>
  <p>Please review the candidate (details were sent to you by email) and submit your decision.</p>
  <form id="f">
    <div id="hm_cv_review" class="fields hide">
      <label>Decision</label>
      <div class="opt"><label class="opt"><input type="radio" name="decision" value="proceed"> Proceed — move forward</label></div>
      <div class="opt"><label class="opt"><input type="radio" name="decision" value="reject"> Reject — not a fit</label></div>
    </div>
    <div id="first_interview" class="fields hide interview-fields"></div>
    <div id="second_interview" class="fields hide interview-fields"></div>
    <div id="offer_approval" class="fields hide">
      <label>Decision</label>
      <div class="opt"><label class="opt"><input type="radio" name="decision" value="approve"> Approve offer</label></div>
      <div class="opt"><label class="opt"><input type="radio" name="decision" value="reject"> Reject offer</label></div>
    </div>
    <div id="generic" class="fields hide">
      <label>Decision</label>
      <input type="text" name="decision_text" placeholder="your decision" />
    </div>

    <!-- Interview-only extras (shown for first_interview / second_interview) -->
    <div id="interview_extras" class="hide">
      <label>Strengths</label>
      <textarea name="strengths" placeholder="What the candidate did well"></textarea>
      <label>Weaknesses / concerns</label>
      <textarea name="weaknesses" placeholder="Gaps or risks"></textarea>
      <label for="rating">Overall rating (1–5)</label>
      <input id="rating" type="number" name="rating" min="1" max="5" />
    </div>

    <label for="comments">Comments</label>
    <textarea id="comments" name="comments" required placeholder="Your notes / reasoning"></textarea>
    <button type="submit">Submit</button>
  </form>
  <div id="out"></div>

  <script>
    // ⬇️ Deployed Apps Script web-app URL.
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTgBf_gukgW5lqrkqvUA55T0JIDZVxyHLvKThZPcNWFHUDmhpoh2i9troQw6RdxuSD/exec";

    const q = new URLSearchParams(location.search);
    const token = q.get("token");
    const purpose = q.get("p") || "generic";   // non-authoritative hint; the app re-derives from the signed token
    const out = document.getElementById("out");

    if (!token) {
      out.innerHTML = '<div class="msg err">Invalid or missing link.</div>';
      document.getElementById("f").classList.add("hide");
    } else {
      const block = document.getElementById(purpose) || document.getElementById("generic");
      block.classList.remove("hide");
      // Interview rounds share a pass/fail/keep verdict + the extra fields.
      if (purpose === "first_interview" || purpose === "second_interview") {
        block.innerHTML =
          '<label>Decision</label>' +
          '<div class="opt"><label class="opt"><input type="radio" name="decision" value="pass"> Pass — advance</label></div>' +
          '<div class="opt"><label class="opt"><input type="radio" name="decision" value="fail"> Fail — do not advance</label></div>' +
          '<div class="opt"><label class="opt"><input type="radio" name="decision" value="keep_in_view"> Keep in view</label></div>';
        document.getElementById("interview_extras").classList.remove("hide");
      }
    }

    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const decision = fd.get("decision") || fd.get("decision_text") || "";
      const comments = fd.get("comments") || "";
      if (!decision) { out.innerHTML = '<div class="msg err">Please choose a decision.</div>'; return; }
      // Interview rounds carry extra structured fields; harmless/empty otherwise.
      const payload = { token, decision, comments };
      for (const k of ["strengths", "weaknesses", "rating"]) {
        const v = fd.get(k);
        if (v != null && String(v).trim() !== "") payload[k] = String(v);
      }
      try {
        const resp = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" }, // text/plain avoids a CORS preflight to Apps Script
          body: JSON.stringify(payload),
        });
        const body = await resp.json();
        if (body && body.ok) {
          out.innerHTML = '<div class="msg ok">Thank you — your response was recorded. You can close this page.</div>';
          document.getElementById("f").classList.add("hide");
        } else { throw new Error("server"); }
      } catch (err) {
        out.innerHTML = '<div class="msg err">Could not submit. Please try again or contact the recruiter.</div>';
      }
    });
  </script>
</body>
</html>
