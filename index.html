<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VNGGames — Recruitment Evaluation Form</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=League+Gothic&display=swap');

    :root {
      --vng-orange: #F05A22; --vng-orange-hover: #D84E1C; --accent-soft: #FEE6DC;
      --ink: #0D0D0D; --body: #333333; --muted: #666666; --line: #E6E6E6; --surface: #F7F7F7;
      --font-display: 'League Gothic', 'Oswald', 'Arial Narrow', sans-serif;
      --font-body: 'Inter Tight', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--surface); color: var(--body); margin: 0; padding: 32px 16px; line-height: 1.55; }
    .card { max-width: 580px; margin: 0 auto; background: #fff; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 12px rgba(13,13,13,0.08); }

    .topbar { background: var(--ink); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .topbar img { height: 24px; width: auto; display: block; }
    .topbar__label { margin-left: auto; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #B3B3B3; }
    .accent-rail { height: 4px; background: var(--vng-orange); }

    .content { padding: 28px 24px 24px; }
    .eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--vng-orange); margin: 0 0 6px; font-weight: 600; }
    h1 { font-family: var(--font-display); font-size: 36px; line-height: 1.05; margin: 0 0 8px; color: var(--ink); text-transform: uppercase; font-weight: 400; letter-spacing: 0.5px; }
    .intro { font-size: 14px; color: var(--muted); margin: 0 0 24px; }

    label { display: block; margin: 0 0 6px; font-weight: 500; font-size: 13px; color: var(--ink); letter-spacing: 0.01em; }
    .section-label { margin-top: 4px; }

    /* Radio "cards" — styled via :has so dynamically-injected options match too. */
    .opt { margin: 0 0 8px; }
    label.opt { display: flex; align-items: center; gap: 10px; font-weight: 400; font-size: 14px; color: var(--body);
      border: 1px solid var(--line); border-radius: 8px; padding: 11px 14px; margin: 0; cursor: pointer; transition: border-color .12s, background .12s; }
    label.opt:hover { border-color: #C9C9C9; }
    label.opt:has(input:checked) { border: 1.5px solid var(--vng-orange); background: var(--accent-soft); color: var(--ink); font-weight: 500; }
    label.opt input[type="radio"] { accent-color: var(--vng-orange); width: 16px; height: 16px; margin: 0; }

    textarea, input[type="number"], input[type="text"] { width: 100%; font: inherit; color: var(--ink);
      border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background: #fff; transition: border-color .12s, box-shadow .12s; }
    textarea { min-height: 92px; resize: vertical; }
    input[type="number"] { width: 88px; }
    textarea:focus, input:focus { outline: none; border-color: var(--vng-orange); box-shadow: 0 0 0 3px rgba(240,90,34,0.18); }
    .field { margin-bottom: 16px; }

    button[type="submit"] { margin-top: 20px; background: var(--vng-orange); color: #fff; border: none; border-radius: 8px;
      padding: 12px 24px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer;
      box-shadow: 0 8px 24px rgba(240,90,34,0.28); transition: background .12s; }
    button[type="submit"]:hover { background: var(--vng-orange-hover); }
    button[type="submit"]:disabled { opacity: .6; cursor: default; box-shadow: none; }

    /* Rating scales for the satisfaction surveys (HM / HRBP / candidate). */
    .q { margin-bottom: 16px; }
    .q > label { display: block; margin-bottom: 7px; font-weight: 500; font-size: 13px; color: var(--ink); }
    .rate { display: flex; gap: 6px; flex-wrap: wrap; }
    .rate button { width: 34px; height: 34px; border: 1px solid var(--line); background: #fff; color: var(--muted);
      border-radius: 8px; font: inherit; font-size: 13px; cursor: pointer; transition: border-color .12s, background .12s; }
    .rate button:hover { border-color: #C9C9C9; }
    .rate button.on { background: var(--vng-orange); border-color: var(--vng-orange); color: #fff; font-weight: 600; }

    .msg { margin-top: 18px; padding: 12px 14px; border-radius: 8px; font-size: 14px; }
    .ok { background: #E7F6EC; color: #1A6E40; border: 1px solid #BBE5C9; }
    .err { background: #FDEAEA; color: #A32D2D; border: 1px solid #F3C9C9; }
    .hide { display: none; }
    .footer-note { margin-top: 18px; font-size: 12px; color: #9A9A9A; }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <img src="./vnggames-logo.png" alt="VNGGames"
           onerror="this.onerror=null; this.src='./vnggames-logo.svg';" />
      <span class="topbar__label">Recruitment Evaluation Form</span>
    </div>
    <div class="accent-rail"></div>

    <div class="content">
      <p class="eyebrow">Candidate review</p>
      <h1 id="form-title">Candidate review</h1>
      <p class="intro">Please review the candidate (details were sent to you by email) and submit your decision.</p>

      <form id="f">
        <div id="hm_cv_review" class="fields hide">
          <label class="section-label">Decision</label>
          <div class="opt"><label class="opt"><input type="radio" name="decision" value="proceed"> Proceed — move forward</label></div>
          <div class="opt"><label class="opt"><input type="radio" name="decision" value="reject"> Reject — not a fit</label></div>
        </div>
        <div id="first_interview" class="fields hide interview-fields"></div>
        <div id="second_interview" class="fields hide interview-fields"></div>
        <div id="offer_approval" class="fields hide">
          <label class="section-label">Decision</label>
          <div class="opt"><label class="opt"><input type="radio" name="decision" value="approve"> Approve offer</label></div>
          <div class="opt"><label class="opt"><input type="radio" name="decision" value="reject"> Reject offer</label></div>
        </div>
        <div id="generic" class="fields hide">
          <label class="section-label">Decision</label>
          <input type="text" name="decision_text" placeholder="your decision" />
        </div>
        <!-- Satisfaction surveys (HM / HRBP / candidate) render their rating rows here. -->
        <div id="survey" class="fields hide"></div>

        <!-- Interview-only extras (shown for first_interview / second_interview) -->
        <div id="interview_extras" class="hide">
          <div class="field"><label>Strengths</label>
            <textarea name="strengths" placeholder="What the candidate did well"></textarea></div>
          <div class="field"><label>Weaknesses / concerns</label>
            <textarea name="weaknesses" placeholder="Gaps or risks"></textarea></div>
        </div>

        <div class="field" style="margin-top:16px;"><label for="comments">Comments</label>
          <textarea id="comments" name="comments" placeholder="Your notes / reasoning"></textarea></div>
        <button type="submit">Submit</button>
      </form>
      <div id="out"></div>
      <p class="footer-note">VNGGames Talent Acquisition · This link is unique to you — please don't forward it.</p>
    </div>
  </div>

  <script>
    // ⬇️ Set this to your deployed Apps Script web-app URL.
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTgBf_gukgW5lqrkqvUA55T0JIDZVxyHLvKThZPcNWFHUDmhpoh2i9troQw6RdxuSD/exec";

    // Per-purpose page title (display font). Falls back to "Candidate review".
    const TITLES = {
      hm_cv_review: "CV Review",
      first_interview: "Interview Verdict",
      second_interview: "Interview Verdict",
      offer_approval: "Offer Approval",
      hm_satisfaction: "Hiring Experience",
      hrbp_satisfaction: "Recruiting Partnership",
      candidate_experience: "Your Experience",
      generic: "Candidate Review",
    };

    // Satisfaction surveys (Phase 3): 1–5 ratings + a 0–10 "recommend". Answers ride
    // the pipeline via `extra` (everything except token/decision/comments is stored
    // as extra_json by the Apps Script and parsed server-side).
    const SURVEYS = {
      hm_satisfaction: {
        intro: "A 30-second read on how hiring is going for you. 1 = poor · 5 = excellent.",
        questions: [
          { key: "quality", label: "Quality of candidates shortlisted to you" },
          { key: "speed", label: "Speed of filling your roles" },
          { key: "visibility", label: "Visibility into where candidates are" },
          { key: "communication", label: "Communication from your recruiter" },
        ],
        recommend: "Would you recommend this hiring process to another manager?",
      },
      hrbp_satisfaction: {
        intro: "A 30-second read for HR business partners. 1 = poor · 5 = excellent.",
        subject: "Which team / business unit do you support?",
        questions: [
          { key: "data_accuracy", label: "Accuracy & timeliness of recruiting data" },
          { key: "transparency", label: "Can you see hiring status without chasing?" },
          { key: "ease", label: "Ease of getting hiring info for planning" },
          { key: "coordination", label: "Coordination with the TA team" },
        ],
        recommend: "Would you recommend the current recruiting process & tools?",
      },
      candidate_experience: {
        intro: "Thanks for your time with us — 30 seconds on how it went. 1 = poor · 5 = excellent.",
        subject: "How far did you get? (e.g. Applied / Interviewed / Offer)",
        questions: [
          { key: "overall", label: "Your overall experience" },
          { key: "communication", label: "Clear, timely updates" },
          { key: "timing", label: "The wait between steps felt reasonable" },
          { key: "respect", label: "You felt treated professionally" },
        ],
        recommend: "Would you encourage others to apply to VNGGames?",
      },
    };

    const q = new URLSearchParams(location.search);
    const token = q.get("token");
    const purpose = q.get("p") || "generic";   // non-authoritative hint; the app re-derives from the signed token
    const out = document.getElementById("out");

    function scaleRow(key, label, max) {
      var html = '<div class="q" data-key="' + key + '"><label>' + label + '</label><div class="rate">';
      for (var i = (max === 10 ? 0 : 1); i <= max; i++) html += '<button type="button" data-v="' + i + '">' + i + '</button>';
      return html + '</div></div>';
    }
    function renderSurvey(p) {
      var cfg = SURVEYS[p], html = "";
      if (cfg.subject) html += '<div class="q"><label>' + cfg.subject + '</label><input type="text" id="s_subject" placeholder="Your answer" /></div>';
      cfg.questions.forEach(function (qq) { html += scaleRow(qq.key, qq.label, 5); });
      html += scaleRow("recommend", cfg.recommend + "  (0–10)", 10);
      var el = document.getElementById("survey");
      el.innerHTML = html;
      el.querySelectorAll(".rate").forEach(function (group) {
        group.querySelectorAll("button").forEach(function (b) {
          b.addEventListener("click", function () {
            group.querySelectorAll("button").forEach(function (x) { x.classList.remove("on"); });
            b.classList.add("on");
          });
        });
      });
    }
    function collectSurvey() {
      var el = document.getElementById("survey"), values = {}, missing = false;
      el.querySelectorAll(".q[data-key]").forEach(function (qq) {
        var key = qq.getAttribute("data-key"), on = qq.querySelector(".rate button.on");
        if (on) values[key] = Number(on.getAttribute("data-v"));
        else if (key !== "recommend") missing = true; // the 1–5 ratings are required; recommend optional
      });
      var subj = document.getElementById("s_subject");
      if (subj && subj.value.trim()) values.subject = subj.value.trim();
      return { values: values, missing: missing };
    }

    if (!token) {
      out.innerHTML = '<div class="msg err">Invalid or missing link.</div>';
      document.getElementById("f").classList.add("hide");
    } else if (SURVEYS[purpose]) {
      document.getElementById("form-title").textContent = TITLES[purpose];
      document.querySelector(".intro").textContent = SURVEYS[purpose].intro;
      document.getElementById("survey").classList.remove("hide");
      renderSurvey(purpose);
    } else {
      document.getElementById("form-title").textContent = TITLES[purpose] || TITLES.generic;
      var block = document.getElementById(purpose) || document.getElementById("generic");
      block.classList.remove("hide");
      // Interview rounds share a pass/fail/keep verdict + the extra fields.
      if (purpose === "first_interview" || purpose === "second_interview") {
        block.innerHTML =
          '<label class="section-label">Decision</label>' +
          '<div class="opt"><label class="opt"><input type="radio" name="decision" value="pass"> Pass — advance</label></div>' +
          '<div class="opt"><label class="opt"><input type="radio" name="decision" value="fail"> Fail — do not advance</label></div>' +
          '<div class="opt"><label class="opt"><input type="radio" name="decision" value="keep_in_view"> Keep in view</label></div>';
        document.getElementById("interview_extras").classList.remove("hide");
      }
    }

    function post(payload, btn) {
      if (btn) { btn.disabled = true; btn.textContent = "Submitting…"; }
      return fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" }, // text/plain avoids a CORS preflight to Apps Script
        body: JSON.stringify(payload),
      }).then(function (resp) { return resp.json(); }).then(function (body) {
        if (body && body.ok) {
          out.innerHTML = '<div class="msg ok">Thank you — your response was recorded. You can close this page.</div>';
          document.getElementById("f").classList.add("hide");
        } else { throw new Error("server"); }
      }).catch(function () {
        out.innerHTML = '<div class="msg err">Could not submit. Please try again or contact the recruiter.</div>';
        if (btn) { btn.disabled = false; btn.textContent = "Submit"; }
      });
    }

    document.getElementById("f").addEventListener("submit", function (e) {
      e.preventDefault();
      var fd = new FormData(e.target);
      var comments = String(fd.get("comments") || "").trim();
      var btn = e.target.querySelector('button[type="submit"]');

      // Satisfaction surveys: gather ratings + recommend + subject; comments optional.
      if (SURVEYS[purpose]) {
        var c = collectSurvey();
        if (c.missing) { out.innerHTML = '<div class="msg err">Please rate each item.</div>'; return; }
        post(Object.assign({ token: token, decision: "submitted", comments: comments }, c.values), btn);
        return;
      }

      var decision = fd.get("decision") || fd.get("decision_text") || "";
      var isInterview = purpose === "first_interview" || purpose === "second_interview";
      var strengths = String(fd.get("strengths") || "").trim();
      var weaknesses = String(fd.get("weaknesses") || "").trim();
      if (!decision) { out.innerHTML = '<div class="msg err">Please choose a decision.</div>'; return; }
      if (isInterview && !strengths) { out.innerHTML = '<div class="msg err">Please fill in Strengths.</div>'; return; }
      if (isInterview && !weaknesses) { out.innerHTML = '<div class="msg err">Please fill in Weaknesses / concerns.</div>'; return; }
      if (!comments) { out.innerHTML = '<div class="msg err">Please fill in Comments.</div>'; return; }
      var payload = { token: token, decision: decision, comments: comments };
      if (isInterview) { payload.strengths = strengths; payload.weaknesses = weaknesses; }
      post(payload, btn);
    });
  </script>
</body>
</html>
